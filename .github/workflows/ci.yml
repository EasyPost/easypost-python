name: 'CI'

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: ~

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP:-/tmp}/just-bin"
          mkdir -p "$install_dir"
          # Resolve the latest release tag via the github.com redirect to avoid
          # api.github.com rate limits on shared runner egress IPs.
          latest_url=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/casey/just/releases/latest)
          just_version="${latest_url##*/tag/}"
          case "$RUNNER_OS" in
            Windows) asset="just-${just_version}-x86_64-pc-windows-msvc.zip" ;;
            macOS)   asset="just-${just_version}-x86_64-apple-darwin.tar.gz" ;;
            *)       asset="just-${just_version}-x86_64-unknown-linux-musl.tar.gz" ;;
          esac
          curl -fL "https://github.com/casey/just/releases/download/${just_version}/${asset}" -o "$install_dir/$asset"
          case "$asset" in
            *.zip) unzip -o "$install_dir/$asset" -d "$install_dir" ;;
            *)     tar -xzf "$install_dir/$asset" -C "$install_dir" ;;
          esac
          echo "$install_dir" >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Dependencies
        run: just install
      - name: Lint
        run: just lint
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # vcrpy is not compatible with Python 3.14 yet so we cannot test against it
        pythonversion: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP:-/tmp}/just-bin"
          mkdir -p "$install_dir"
          # Resolve the latest release tag via the github.com redirect to avoid
          # api.github.com rate limits on shared runner egress IPs.
          latest_url=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/casey/just/releases/latest)
          just_version="${latest_url##*/tag/}"
          case "$RUNNER_OS" in
            Windows) asset="just-${just_version}-x86_64-pc-windows-msvc.zip" ;;
            macOS)   asset="just-${just_version}-x86_64-apple-darwin.tar.gz" ;;
            *)       asset="just-${just_version}-x86_64-unknown-linux-musl.tar.gz" ;;
          esac
          curl -fL "https://github.com/casey/just/releases/download/${just_version}/${asset}" -o "$install_dir/$asset"
          case "$asset" in
            *.zip) unzip -o "$install_dir/$asset" -d "$install_dir" ;;
            *)     tar -xzf "$install_dir/$asset" -C "$install_dir" ;;
          esac
          echo "$install_dir" >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pythonversion }}
      - name: Install Dependencies
        run: just install
      - name: Run Tests
        run: EASYPOST_TEST_API_KEY=123 EASYPOST_PROD_API_KEY=123 just coverage
      - name: Coverage
        if: github.ref == 'refs/heads/master'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Run security analysis
        run: just scan
  docs:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP:-/tmp}/just-bin"
          mkdir -p "$install_dir"
          # Resolve the latest release tag via the github.com redirect to avoid
          # api.github.com rate limits on shared runner egress IPs.
          latest_url=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/casey/just/releases/latest)
          just_version="${latest_url##*/tag/}"
          case "$RUNNER_OS" in
            Windows) asset="just-${just_version}-x86_64-pc-windows-msvc.zip" ;;
            macOS)   asset="just-${just_version}-x86_64-apple-darwin.tar.gz" ;;
            *)       asset="just-${just_version}-x86_64-unknown-linux-musl.tar.gz" ;;
          esac
          curl -fL "https://github.com/casey/just/releases/download/${just_version}/${asset}" -o "$install_dir/$asset"
          case "$asset" in
            *.zip) unzip -o "$install_dir/$asset" -d "$install_dir" ;;
            *)     tar -xzf "$install_dir/$asset" -C "$install_dir" ;;
          esac
          echo "$install_dir" >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Dependencies
        run: just install
      - name: Generate Docs
        run: just docs
      - name: Deploy Docs
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
